# =============================================================================
# Namespaces Application — Sync Wave -2 (deploys FIRST)
# =============================================================================
# Creates all required namespaces before any other resource is deployed.
# Without this, services would fail because their target namespaces don't exist.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces
  namespace: argocd
  annotations:
    # Sync wave -2 ensures namespaces exist before everything else
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: eks-assignment

  source:
    # TODO: Replace YOUR_ORG/YOUR_CD_REPO with your actual CD repo
    repoURL: https://github.com/YOUR_ORG/YOUR_CD_REPO
    targetRevision: HU-DEVOPS-26-yourname
    path: helm/namespaces

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true       # Delete namespaces removed from Git
      selfHeal: true    # Revert manual namespace changes
    syncOptions:
      - CreateNamespace=true
