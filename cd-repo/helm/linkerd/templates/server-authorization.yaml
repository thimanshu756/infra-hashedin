{{- range .Values.policies }}
---
# Server: defines which port/protocol to protect
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: {{ .name }}-server
  namespace: {{ .namespace }}
spec:
  podSelector:
    matchLabels:
      app: {{ .targetApp }}
  port: {{ .targetPort }}
  proxyProtocol: HTTP/1

---
# ServerAuthorization: defines WHO is allowed to call this Server
# api-gateway is non-meshed (by design — see assignment Section 10), so it
# cannot present a mesh identity. We use unauthenticated: true for gateway
# traffic and rely on NetworkPolicies for namespace-level isolation
# (defense-in-depth). Meshed-to-meshed traffic still gets mTLS enforcement
# via Linkerd's default policies.
apiVersion: policy.linkerd.io/v1beta3
kind: ServerAuthorization
metadata:
  name: {{ .name }}-allow
  namespace: {{ .namespace }}
spec:
  server:
    name: {{ .name }}-server
  client:
    unauthenticated: true
    networks:
      - cidr: 0.0.0.0/0
{{- end }}
