namespace: logging

loki-stack:
  loki:
    enabled: true
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: gp2

    config:
      auth_enabled: false

      ingester:
        chunk_idle_period: 3m
        chunk_block_size: 262144
        chunk_retain_period: 1m
        max_transfer_retries: 0
        lifecycler:
          ring:
            replication_factor: 1

      limits_config:
        enforce_metric_name: false
        reject_old_samples: true
        reject_old_samples_max_age: 168h    # 7 days
        retention_period: 168h

      schema_config:
        configs:
          - from: "2020-10-24"
            store: boltdb-shipper
            object_store: filesystem
            schema: v11
            index:
              prefix: index_
              period: 24h

      storage_config:
        boltdb_shipper:
          active_index_directory: /data/loki/boltdb-shipper-active
          cache_location: /data/loki/boltdb-shipper-cache
          shared_store: filesystem
        filesystem:
          directory: /data/loki/chunks

    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "300m"
        memory: "512Mi"

  promtail:
    enabled: true

    config:
      clients:
        - url: http://loki.logging.svc.cluster.local:3100/loki/api/v1/push

      snippets:
        pipelineStages:
          - docker: {}
          - json:
              expressions:
                level: level
                service: service
                trace_id: trace_id
                message: message
          - labels:
              level:
              service:
          - output:
              source: message

    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"

    # DaemonSet must run on every node to collect all logs
    tolerations:
      - effect: NoSchedule
        operator: Exists
