---
apiVersion: v1
kind: Namespace
metadata:
  name: sealed-secrets
  labels:
    {{- toYaml $commonLabels | nindent 4 }}

---
apiVersion: v1
kind: Namespace
metadata:
  name: security
  labels:
    {{- toYaml $commonLabels | nindent 4 }}
