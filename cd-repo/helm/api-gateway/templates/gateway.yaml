# Gateway — creates the actual LoadBalancer entry point
# Kong provisions an AWS ELB for this (takes 2-3 min for IP assignment)
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.namespace }}
  annotations:
    konghq.com/strip-path: "false"
spec:
  gatewayClassName: kong
  listeners:
    - name: http
      port: {{ .Values.gateway.port }}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All    # Allow HTTPRoutes from any namespace
