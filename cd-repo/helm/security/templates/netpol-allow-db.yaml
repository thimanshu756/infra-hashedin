# =============================================================================
# NetworkPolicy — Allow Backend Services to Reach Database
# =============================================================================
# Backend services need egress to PostgreSQL (port 5432) and PgBouncer
# (port 6432) in the database namespace.
# Database namespace needs ingress only from backend namespaces.
# Frontend does NOT get database access — it talks through API gateway.
# =============================================================================

# backend-users → database (egress)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-database
  namespace: backend-users
spec:
  podSelector:
    matchLabels:
      app: users-service
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
      ports:
        - port: 5432
        - port: 6432    # PgBouncer port

# backend-products → database (egress)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-database
  namespace: backend-products
spec:
  podSelector:
    matchLabels:
      app: products-service
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
      ports:
        - port: 5432
        - port: 6432

# backend-orders → database (egress)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-database
  namespace: backend-orders
spec:
  podSelector:
    matchLabels:
      app: orders-service
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
      ports:
        - port: 5432
        - port: 6432

# database ← backends (ingress)
# Only accept connections FROM backend namespaces on DB ports
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-backends
  namespace: database
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: backend-users
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: backend-products
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: backend-orders
      ports:
        - port: 5432
        - port: 6432
