# =============================================================================
# NetworkPolicy — Allow Kong Gateway to Reach Services
# =============================================================================
# Allows ingress from the api-gateway namespace to each app namespace.
# Kong Gateway forwards HTTP traffic to backend services and frontend.
# Each policy is namespace-specific with correct app labels and ports.
# =============================================================================

# Allow ingress from api-gateway to frontend (port 3000)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-gateway
  namespace: frontend
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: api-gateway
      ports:
        - port: 3000

