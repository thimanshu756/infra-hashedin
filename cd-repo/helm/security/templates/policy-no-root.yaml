# =============================================================================
# Kyverno Policy — Disallow Root User
# =============================================================================
# Enforces runAsNonRoot: true on all pods in app namespaces.
# Our Dockerfiles use appuser (UID 1000) and deployments set runAsNonRoot.
# This policy catches any drift or manual deployment that violates this.
# Mode: Enforce — pods that run as root are REJECTED, not just warned.
# =============================================================================
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-root-user
  annotations:
    policies.kyverno.io/title: Disallow Root User
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Containers must not run as root. Enforces runAsNonRoot: true
      on the pod security context. Kyverno will REJECT any pod
      that does not set runAsNonRoot in app namespaces.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-runAsNonRoot
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - frontend
                - backend-users
                - backend-products
                - backend-orders
      validate:
        message: >-
          Running as root is not allowed.
          Set spec.securityContext.runAsNonRoot: true
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
