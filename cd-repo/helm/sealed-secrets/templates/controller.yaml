# =============================================================================
# Sealed Secrets Controller — installed via Helm subchart dependency
# =============================================================================
# The sealed-secrets subchart (declared in Chart.yaml) handles:
#   - Controller Deployment
#   - ServiceAccount + RBAC
#   - CRDs (SealedSecret)
#   - Service for kubeseal certificate fetching
#
# The controller watches for SealedSecret resources and decrypts them
# into regular Kubernetes Secrets using the cluster-specific key pair.
#
# IMPORTANT: Backup the master key for disaster recovery:
#   kubectl get secret -n sealed-secrets \
#     -l sealedsecrets.bitnami.com/sealed-secrets-key \
#     -o yaml > sealed-secrets-master-key-backup.yaml
#   Store this safely — NEVER commit to Git.
#
# Sealed DB credential files (sealed-db-*.yaml) are generated by:
#   scripts/create-sealed-secrets.sh
# and committed to this directory after Phase 4 setup.
# =============================================================================
