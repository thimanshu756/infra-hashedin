# Creates gcr-pull-secret in every app namespace so K8s can pull images from GCR
# The actual dockerconfigjson is injected via:
#   Option A: scripts/create-gcr-secret.sh (manual, one-time)
#   Option B: SealedSecret (Phase 4, GitOps-managed)
{{- range .Values.namespaces }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gcr-pull-secret
  namespace: {{ . }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $.Values.dockerconfigjson | quote }}
{{- end }}
