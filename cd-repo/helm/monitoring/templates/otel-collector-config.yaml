# =============================================================================
# OpenTelemetry Collector Configuration
# =============================================================================
# The OTEL Collector sits between Flask apps and Tempo.
# Flask apps → (OTLP gRPC :4317) → OTEL Collector → (OTLP gRPC) → Tempo
# This decouples app instrumentation from the tracing backend.
# If we switch from Tempo to Jaeger, only Collector config changes.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ .Values.namespace }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 100
      memory_limiter:
        check_interval: 1s
        limit_mib: 200

    exporters:
      otlp:
        endpoint: tempo.monitoring.svc.cluster.local:4317
        tls:
          insecure: true
      logging:
        loglevel: warn

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp]
