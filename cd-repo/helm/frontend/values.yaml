replicaCount: 2

image:
  # TODO: Replace YOUR_AWS_ACCOUNT_ID with your 12-digit AWS account ID
  repository: YOUR_AWS_ACCOUNT_ID.dkr.ecr.us-west-1.amazonaws.com/frontend
  tag: "latest"        # CI pipeline overwrites this with SHORT_SHA on every push
  pullPolicy: Always

imagePullSecrets: []

nameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

namespace: frontend

config:
  GATEWAY_URL: "http://kong-gateway.api-gateway.svc.cluster.local"
  OTEL_SERVICE_NAME: "frontend"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4317"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_PROPAGATORS: "tracecontext,baggage"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3
