# =============================================================================
# PostgreSQL Init Script
# =============================================================================
# Creates application tables on first database startup.
# Mounted as init script by Percona Operator.
# Tables match the Flask microservices CRUD schemas from Phase 2.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
  namespace: {{ .Values.namespace }}
data:
  init.sql: |
    -- =================================================
    -- EKS Assignment — Database Schema
    -- =================================================

    -- Users table (users-service)
    CREATE TABLE IF NOT EXISTS users (
      id         SERIAL PRIMARY KEY,
      name       VARCHAR(100) NOT NULL,
      email      VARCHAR(100) UNIQUE NOT NULL,
      role       VARCHAR(50) DEFAULT 'user',
      created_at TIMESTAMP DEFAULT NOW()
    );

    -- Products table (products-service)
    CREATE TABLE IF NOT EXISTS products (
      id         SERIAL PRIMARY KEY,
      name       VARCHAR(100) NOT NULL,
      price      DECIMAL(10,2) NOT NULL,
      category   VARCHAR(50),
      created_at TIMESTAMP DEFAULT NOW()
    );

    -- Orders table (orders-service)
    CREATE TABLE IF NOT EXISTS orders (
      id         SERIAL PRIMARY KEY,
      user_id    INTEGER NOT NULL,
      product_id INTEGER NOT NULL,
      quantity   INTEGER NOT NULL DEFAULT 1,
      status     VARCHAR(50) DEFAULT 'pending',
      created_at TIMESTAMP DEFAULT NOW()
    );

    -- Verify tables created
    SELECT table_name FROM information_schema.tables
    WHERE table_schema = 'public';
